<!doctype html>
<html lang="en">
  <head>

    <title>METS Game - Transformation Generate</title>

  </head>
  <body>
    <main class="page-shell">
      <h1>Stage 3 — Generated Schemes</h1>

      <section class="card">
        <h2>Source Concept</h2>

        <h2>Generated Ideas</h2>

      <div class="actions">

      </div>
    </main>

    <script src="transformation_data.js"></script>
    <script src="transformation_rules.js"></script>
