<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>METS Game - Transformation Trace</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <main class="page-shell">
      <h1>Stage 3 — Transformation Trace</h1>

      <section class="card">
        <h2>Source Concept</h2>
        <p><b>Name:</b> <span id="sourceName"></span></p>
        <p><b>User:</b> <span id="sourceUser"></span></p>
        <p><b>Problem:</b> <span id="sourceProblem"></span></p>
        <p><b>Pitch:</b> <span id="sourcePitch"></span></p>
      </section>

      <section class="card">
        <h2>Selected Scheme</h2>
        <p><b>Title:</b> <span id="schemeTitle"></span></p>
        <p><b>Description:</b> <span id="schemeDescription"></span></p>
        <p><b>Features:</b> <span id="schemeFeatures"></span></p>
        <p><b>Rules Used:</b> <span id="schemeRules"></span></p>
      </section>

      <section class="card">
        <h2>Trace Steps</h2>
        <ol id="traceList"></ol>
      </section>

      <section class="card">
        <h2>Evaluation</h2>
        <p><b>Novelty:</b> <span id="scoreNovelty"></span></p>
        <p><b>Practicality:</b> <span id="scorePracticality"></span></p>
        <p><b>Cost Effectiveness:</b> <span id="scoreCost"></span></p>
        <p><b>Overall:</b> <span id="scoreOverall"></span></p>
      </section>

      <section class="card">
        <h2>Transformation Mapping</h2>
        <table border="1" cellpadding="8" cellspacing="0">
          <thead>
            <tr>
              <th>Stage</th>
              <th>Content</th>
            </tr>
          </thead>
          <tbody id="mappingTableBody"></tbody>
        </table>
      </section>

      <div class="actions">
        <button id="backBtn">Back</button>
        <button id="finishBtn">Finish Stage 3</button>
      </div>
    </main>

    <script src="transformation_data.js"></script>
    <script src="transformation_trace.js"></script>
  </body>
</html>
