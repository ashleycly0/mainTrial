<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>METS Game - Level 1.1: Matter (Smart Cup)</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    
    <style>
        body { margin: 0; background: #050a08; }
        .split-screen { display: flex; height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace; background: #050a08; }
        
        /* 左側輸入區 */
        .input-panel { width: 50%; padding: 5%; overflow-y: auto; border-right: 1px solid rgba(245, 158, 11, 0.3); }
        .section-box { background: rgba(255, 251, 235, 0.05); border-radius: 20px; padding: 25px; margin-top: 20px; }
        
        /* 完美對齊的輸入框樣式 */
        .input-row { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 15px; 
        }
        .input-row input, #obj-name { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(245, 158, 11, 0.5); 
            color: #fef3c7; 
            padding: 12px; 
            border-radius: 8px; 
            flex: 1; /* 平分空間 */
            width: 0; /* 防止撐破 */
            font-size: 1rem;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        .input-row input:focus, #obj-name:focus {
            border-color: #F59E0B; 
            background: rgba(245, 158, 11, 0.1); 
            outline: none;
        }
        
        /* 唯讀狀態 (鼠標變成🚫) */
        .input-row input[readonly], #obj-name[readonly] {
            background: rgba(245, 158, 11, 0.1); 
            color: rgba(254, 243, 199, 0.5); 
            cursor: not-allowed; 
            border-color: rgba(245, 158, 11, 0.2);
        }

        /* 按鈕樣式 */
        .btn-add { background: none; border: 1px dashed #F59E0B; color: #F59E0B; cursor: pointer; border-radius: 8px; padding: 10px; width: 100%; margin-top: 10px; font-size: 1rem; transition: 0.3s; }
        .btn-add:hover { background: rgba(245, 158, 11, 0.1); border-style: solid; }
        .btn-next { background: #92400E; color: white; padding: 15px; border-radius: 10px; cursor: pointer; border: none; width: 100%; margin-top: 30px; font-size: 1.1rem; transition: 0.3s; }
        .btn-next:hover { background: #F59E0B; transform: translateY(-2px); }

        /* 右側 3D 預覽區 */
        .preview-panel { width: 50%; background: #0a120f; position: relative; height: 100vh; }
        #three-container { width: 100%; height: 100%; display: block; }
        .preview-label { position: absolute; top: 20px; left: 20px; color: rgba(255,255,255,0.3); font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>

    <div class="split-screen">
        <div class="input-panel">
            <h1 style="color: #F59E0B; margin-top: 0;">Level 1.1: Matter-Element</h1>
            <p style="color: #ccc;">Define the static attributes of your <strong>Smart Cup</strong>.</p>

            <div class="section-box">
                <label style="color: #F59E0B; display: block; margin-bottom: 10px;">Object Name:</label>
                <input type="text" id="obj-name" value="Smart Cup" readonly title="The core object for this project is fixed as Smart Cup" style="width: 100%; margin-bottom: 20px;">
                
                <div id="m-list">
                    <label style="color: #F59E0B; display: block; margin-bottom: 10px;">Characteristics & Values:</label>
                    
                    <div class="input-row">
                        <input type="text" class="m-char" value="Material" readonly title="Core attribute cannot be modified">
                        <input type="text" class="m-val" placeholder="e.g. Steel / Glass" oninput="update3D()">
                    </div>
                    
                    <div class="input-row">
                        <input type="text" class="m-char" value="Color" readonly title="Core attribute cannot be modified">
                        <input type="text" class="m-val" placeholder="e.g. Blue / Red / Gold" oninput="update3D()">
                    </div>
                </div>
                
                <button class="btn-add" onclick="addMatterRow()">+ Add Custom Attribute</button>
            </div>

            <button class="btn-next" onclick="saveAndGo('affair.html')">Next: Affair-Element ➔</button>
        </div>

        <div class="preview-panel">
            <div id="three-container"></div>
            <div class="preview-label">3D DIGITAL TWIN PREVIEW</div>
        </div>
    </div>

    <script src="model.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, previewModel, controls;

        function init3D() {
            const container = document.getElementById('three-container');
            if (!container) return;

            // 1. 場景
            scene = new THREE.Scene();
            
            // 2. 相機
            camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(2, 2, 3);

            // 3. 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // 4. 燈光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            // 5. 建立 Smart Cup 模型 (圓柱體)
            const geometry = new THREE.CylinderGeometry(0.6, 0.5, 1.4, 32);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0xeeeeee, 
                roughness: 0.4, 
                metalness: 0.3 
            });
            previewModel = new THREE.Mesh(geometry, material);
            scene.add(previewModel);

            // 6. 控制器 (讓你可以用鼠標旋轉杯子)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            if (renderer && scene && camera) renderer.render(scene, camera);
        }

        // 全域函數：根據輸入改變 3D 模型
        window.update3D = function() {
            if (!previewModel) return;
            
            const chars = document.querySelectorAll('.m-char');
            const vals = document.querySelectorAll('.m-val');

            vals.forEach((input, i) => {
                const charText = chars[i].value.toLowerCase();
                const valText = input.value.toLowerCase().trim();

                // 顏色變化邏輯
                if (charText.includes('color')) {
                    const colors = {
                        'red': 0xff4444, 'blue': 0x4444ff, 'green': 0x44ff44,
                        'gold': 0xffd700, 'black': 0x111111, 'white': 0xffffff,
                        'silver': 0xc0c0c0
                    };
                    if (colors[valText]) previewModel.material.color.setHex(colors[valText]);
                }

                // 材質變化邏輯 (模擬金屬感)
                if (charText.includes('material')) {
                    if (valText.includes('metal') || valText.includes('steel')) {
                        previewModel.material.metalness = 0.8;
                        previewModel.material.roughness = 0.2;
                    } else {
                        previewModel.material.metalness = 0.1;
                        previewModel.material.roughness = 0.8;
                    }
                }
            });
        };

        // 監聽視窗縮放
        window.addEventListener('resize', () => {
            const container = document.getElementById('three-container');
            if(container && camera && renderer) {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            }
        });

        // 確保 DOM 載入後再啟動 3D
        document.addEventListener('DOMContentLoaded', init3D);
    </script>
</body>
</html>
