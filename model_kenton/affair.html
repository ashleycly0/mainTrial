<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>METS Game - Level 1.2: Affair (Smart Features)</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body { margin: 0; background: #050a08; color: #FFFBEB; font-family: 'Courier New', monospace; }
        .split-screen { display: flex; height: 100vh; overflow: hidden; }
        .input-panel { width: 50%; padding: 5%; overflow-y: auto; border-right: 1px solid rgba(245, 158, 11, 0.3); }
        .section-box { background: rgba(255, 251, 235, 0.05); border-radius: 20px; padding: 25px; margin-top: 20px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-row input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(245, 158, 11, 0.5); color: #fef3c7; padding: 12px; border-radius: 8px; flex: 1; width: 0; font-size: 0.9rem; transition: all 0.3s;}
        .input-row input:focus { border-color: #F59E0B; background: rgba(245, 158, 11, 0.1); outline: none; }
        input[readonly] { background: rgba(245, 158, 11, 0.1); color: rgba(254, 243, 199, 0.5); cursor: not-allowed; }
        .btn-add { background: none; border: 1px dashed #F59E0B; color: #F59E0B; cursor: pointer; border-radius: 8px; padding: 10px; width: 100%; margin-top: 10px; font-size: 1rem; transition: 0.3s;}
        .btn-add:hover { background: rgba(245, 158, 11, 0.1); border-style: solid; }
        .btn-next { background: #92400E; color: white; padding: 15px; border-radius: 10px; cursor: pointer; border: none; width: 100%; margin-top: 30px; font-size: 1.1rem; width: 100%; transition: 0.3s;}
        .btn-next:hover { background: #F59E0B; transform: translateY(-2px); }
        .preview-panel { width: 50%; background: #0a120f; position: relative; }
        #three-container { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

<div class="split-screen">
    <div class="input-panel">
        <h1 style="color: #F59E0B; margin-top: 0;">Level 1.2: Affair-Element</h1>
        <p>Define dynamic features for the <strong id="display-obj">Smart Cup</strong>.</p>
        <div class="section-box">
            <div id="a-list">
                <label style="color: #F59E0B; display: block; margin-bottom: 10px;">Action | Characteristic | Value</label>
                <div class="input-row">
                    <input type="text" class="a-act" value="Drinking" readonly>
                    <input type="text" class="a-char" value="Temperature" readonly>
                    <input type="text" class="a-val" placeholder="e.g. Hot" oninput="updateAffair3D()">
                </div>
            </div>
            <button class="btn-add" onclick="addAffairRow()">+ Add Custom Action</button>
        </div>
        <button class="btn-next" onclick="saveAndGo('relation.html')">Next: Relation ➔</button>
    </div>
    <div class="preview-panel">
        <div id="three-container"></div>
    </div>
</div>

<script src="model.js"></script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, model, controls, clock;
    let activeActions = { tracking: false, heating: false, sensing: false, washing: false };
    let effects = { signal: null, sensorLED: null }; 

    let originalSettings = {
        color: 0xeeeeee,
        metalness: 0.0,
        roughness: 0.8
    };

    function init() {
        const container = document.getElementById('three-container');
        clock = new THREE.Clock();
        scene = new THREE.Scene();

        // 1. 初始化渲染器與相機 (解決長寬比問題)
        const width = container.clientWidth;
        const height = container.clientHeight;
        camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);
        camera.position.set(2, 2, 4);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(width, height);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7);
        scene.add(light);

        // 2. 建立模型並載入上一頁 Matter 參數
        const geometry = new THREE.CylinderGeometry(0.6, 0.5, 1.4, 32);
        const cupMat = new THREE.MeshStandardMaterial({ 
            color: originalSettings.color, 
            roughness: originalSettings.roughness, 
            metalness: originalSettings.metalness 
        });
        model = new THREE.Mesh(geometry, cupMat);
        scene.add(model);

        const saved = JSON.parse(localStorage.getItem('temp_model'));
        if (saved && saved.matter) {
            saved.matter.forEach(item => {
                const char = (item.char || "").toLowerCase();
                const val = (item.val || "").toLowerCase().trim();
                if (char.includes('color') || char.includes('顏色')) {
                    const colorMap = { 'blue': 0x4444ff, 'red': 0xff4444, 'green': 0x44ff44, 'gold': 0xffd700, 'black': 0x111111, 'white': 0xffffff, '藍色': 0x4444ff, '紅色': 0xff4444 };
                    originalSettings.color = colorMap[val] || val;
                }
                if (char.includes('material') || char.includes('材質')) {
                    if (val.includes('metal') || val.includes('steel') || val.includes('金屬')) {
                        originalSettings.metalness = 0.8; originalSettings.roughness = 0.2;
                    }
                }
            });
            model.material.color.set(originalSettings.color);
            model.material.metalness = originalSettings.metalness;
            model.material.roughness = originalSettings.roughness;
        }

        // 3. 特效物件初始化
        const ringGeo = new THREE.RingGeometry(0.7, 0.75, 32);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x44aaff, side: THREE.DoubleSide, transparent: true });
        effects.signal = new THREE.Mesh(ringGeo, ringMat);
        effects.signal.rotation.x = Math.PI / 2;
        effects.signal.visible = false;
        scene.add(effects.signal);

        const sensorGeo = new THREE.SphereGeometry(0.06, 16, 16);
        const sensorMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true });
        effects.sensorLED = new THREE.Mesh(sensorGeo, sensorMat);
        effects.sensorLED.position.set(0.55, 0.3, 0); 
        effects.sensorLED.visible = false;
        model.add(effects.sensorLED); 

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 【關鍵改動】全域監聽：不管用戶動哪一邊的框，都觸發 updateAffair3D
        document.addEventListener('input', (e) => {
            if (e.target.classList.contains('a-act') || e.target.classList.contains('a-val')) {
                updateAffair3D();
            }
        });

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        model.rotation.y += 0.005; 

        // Tracking 特效
        if (activeActions.tracking) {
            effects.signal.visible = true;
            effects.signal.scale.setScalar(1 + (t % 1.2) * 1.5);
            effects.signal.material.opacity = 1 - (t % 1.2);
            effects.signal.position.copy(model.position);
            effects.signal.position.y = model.position.y + 0.8;
        } else { effects.signal.visible = false; }

        // Sensing 特效
        if (activeActions.sensing) {
            effects.sensorLED.visible = true;
            effects.sensorLED.material.opacity = 0.4 + Math.sin(t * 5) * 0.4;
            effects.sensorLED.material.color.setHSL((t % 2) / 2, 0.8, 0.5);
        } else { effects.sensorLED.visible = false; }

        // Washing 輕微晃動 與 Heating 震動
        if (activeActions.washing) {
            model.position.x = Math.sin(t * 20) * 0.03; // 洗滌：輕微律動
        } else if (activeActions.heating) {
            model.position.x = Math.sin(t * 40) * 0.015; // 加熱：高頻微震
        } else {
            model.position.x = THREE.MathUtils.lerp(model.position.x, 0, 0.1);
        }

        // 顏色過渡邏輯
        if (activeActions.heating) {
            model.material.color.lerp(new THREE.Color(0xffaa44), 0.1);
        } else {
            model.material.color.lerp(new THREE.Color(originalSettings.color), 0.1);
        }

        controls.update();
        renderer.render(scene, camera);
    }

    // 【核心邏輯】不論先填哪邊，只要滿足「雙框有值」且「左邊有關鍵字」就觸發
    function updateAffair3D() {
        const acts = document.querySelectorAll('.a-act');
        const vals = document.querySelectorAll('.a-val');
        
        activeActions.tracking = false;
        activeActions.heating = false;
        activeActions.sensing = false;
        activeActions.washing = false;

        for (let i = 0; i < acts.length; i++) {
            const a = acts[i].value.trim().toLowerCase();
            const v = vals[i].value.trim();
            
            // 只有當 Action 框有文字，且 Value 框也有文字時
            if (a !== "" && v !== "") {
                if (a.includes('track')) activeActions.tracking = true;
                if (a.includes('sens')) activeActions.sensing = true;
                if (a.includes('heat')) activeActions.heating = true;
                if (a.includes('wash') || a.includes('洗')) activeActions.washing = true;
            }
        }
    }

    window.addEventListener('resize', () => {
        const container = document.getElementById('three-container');
        if (!container) return;
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    init();
</script>
</body>
</html>
